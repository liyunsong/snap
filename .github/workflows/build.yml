name: Build

on:
  push:
    branches: [ "main", "cursor/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DMG (Apple Silicon)
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version
      
      - name: Resolve dependencies
        run: swift package resolve
      
      - name: Build
        run: swift build -c release --arch arm64
      
      - name: Package DMG
        run: make dmg
      
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Snap-macOS-AppleSilicon
          path: .build/release/Snap-*.dmg
          if-no-files-found: error
          retention-days: 30
