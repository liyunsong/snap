name: CI Build (macOS)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package on macos-14
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release, universal binary)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package (.app, ZIP, DMG)
        run: |
          make app
          make zip
          make dmg

      - name: List build artifacts
        run: ls -lh .build/release

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: Snap-macos-${{ github.sha }}
          path: |
            .build/release/Snap-*.zip
            .build/release/Snap-*.dmg
          if-no-files-found: error
          retention-days: 7
