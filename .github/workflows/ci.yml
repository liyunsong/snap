name: CI Build (macOS)

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Package on macos-14
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release, Apple Silicon)
        run: swift build -c release --arch arm64

      - name: Package (.app + ZIP + DMG)
        run: |
          make app
          make zip
          make dmg

      - name: List build artifacts
        run: ls -lh .build/release

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Snap-macOS-AppleSilicon
          path: |
            .build/release/Snap-*.zip
            .build/release/Snap-*.dmg
          if-no-files-found: error
          retention-days: 30
